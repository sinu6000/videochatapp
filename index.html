<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrangerPulse - Colorful Rajasthani Leheriya Theme</title>
    <style>
        :root {
            --bg-main: #0c020f;
            --bg-card: rgba(28, 5, 26, 0.88); /* पारदर्शी ट्रेडिशनल डार्क लुक */
            --accent: #ff007f; /* ब्राइट राजस्थानी पिंक */
            --accent-gold: #ffd700; /* राजस्थानी जरी वर्क गोल्ड */
            --accent-blue: #00f0ff; 
            --text: #ffffff;
            --text-muted: #e0b0ff;
            --border: rgba(255, 0, 127, 0.3);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* 📸 यहाँ पर कलरफुल राजस्थानी लहरिया ओढ़नी का परफैक्ट वर्किंग वॉलपेपर सेट कर दिया है */
            background-image: linear-gradient(rgba(12, 2, 15, 0.5), rgba(12, 2, 15, 0.7)), url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: var(--bg-main);
            
            height: 100vh; display: flex; flex-direction: column;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(25, 3, 22, 0.95); border-bottom: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }
        header .logo { font-size: 1.5rem; font-weight: 800; color: #ffffff; text-shadow: 0 0 8px var(--accent); }
        header .stats { font-size: 0.9rem; color: var(--accent-gold); font-weight: 600; text-shadow: 0 0 5px var(--accent-gold); }

        .home-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; text-align: center; padding: 20px;
        }
        .home-screen h2 { font-size: 2.6rem; margin-bottom: 10px; font-weight: 700; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .home-screen p { color: var(--text-muted); max-width: 500px; margin-bottom: 30px; font-size: 1.1rem; text-shadow: 0 1px 5px rgba(0,0,0,0.5); }
        
        .filters-container {
            background: var(--bg-card); padding: 25px; border-radius: 16px;
            border: 1px solid var(--border); width: 100%; max-width: 450px; margin-bottom: 25px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .filter-row { display: flex; justify-content: space-between; margin-bottom: 15px; text-align: left; gap: 15px; }
        .filter-row div { flex: 1; display: flex; flex-direction: column; }
        .filter-row label { font-size: 0.8rem; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 5px; font-weight: bold; }
        .filter-row select { background: #0c0211; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; outline: none; cursor: pointer; }

        .action-buttons { display: flex; gap: 15px; width: 100%; max-width: 500px; }
        .start-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-text { background: #23051f; color: white; border: 1px solid var(--accent); box-shadow: 0 0 10px rgba(255, 0, 127, 0.2); }
        .btn-video { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent); }
        .start-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .app-screen { display: none; flex: 1; height: calc(100vh - 65px); }
        
        .video-wrapper { flex: 1.2; background: #000; position: relative; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .video-box { width: 100%; height: 50%; background: #050108; position: relative; overflow: hidden; border-bottom: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-label { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 15px; font-size: 0.85rem; border: 1px solid var(--accent); }
        
        .chat-wrapper { flex: 1; background: #0c020f; display: flex; flex-direction: column; }
        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .messages-area p { margin: 0; padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .msg-system { background: transparent; color: var(--accent-gold); align-self: center; font-size: 0.85rem; text-align: center; font-weight: bold; }
        .msg-you { background: #23051f; color: white; align-self: flex-end; border: 1px solid var(--accent); }
        .msg-stranger { background: #1c0921; color: white; align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }

        .input-bar { padding: 15px; background: #1a0418; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; background: #0c020f; border: 1px solid var(--border); padding: 14px; border-radius: 25px; color: white; font-size: 1rem; outline: none; }
        .btn-skip { background: #3a1534; color: white; border: none; padding: 14px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 14px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        .status-badge { position: absolute; top: 15px; left: 15px; background: var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; z-index: 10; box-shadow: 0 0 10px var(--accent); }
    </style>
    <script src="https://socket.io"></script>
</head>
<body>

    <header>
        <div class="logo">StrangerPulse // Rangeelo Rajasthan</div>
        <div class="stats">● 3,142 Chhoris & Chhoras Online</div>
    </header>

    <div class="home-screen" id="homeScreen">
        <h2>Talk to Strangers, Instantly.</h2>
        <p>Free random video and text chat with real people worldwide based on your traditional preferences.</p>
        
        <div class="filters-container">
            <div class="filter-row">
                <div>
                    <label>My Profile</label>
                    <select id="myGender">
                        <option value="boy">Boy 🕺</option>
                        <option value="girl">Girl 💃</option>
                    </select>
                </div>
                <div>
                    <label>Match With</label>
                    <select id="lookFor">
                        <option value="anyone">Anyone 🌍</option>
                        <option value="girl">Girls Only 💃</option>
                        <option value="boy">Boys Only 🕺</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div>
                    <label>Location</label>
                    <select id="countryFilter">
                        <option value="any">Worldwide 🌐</option>
                        <option value="IN">India 🇮🇳</option>
                        <option value="US">United States 🇺🇸</option>
                    </select>
                </div>
                <div>
                    <label>Language</label>
                    <select id="langFilter">
                        <option value="any">Any Language 🗣️</option>
                        <option value="hindi">Hindi 🇮🇳</option>
                        <option value="english">English 🇬🇧</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="start-btn btn-text" onclick="startMatching('text')">Text Chat 💬</button>
            <button class="start-btn btn-video" onclick="startMatching('video')">Video Chat 🎥</button>
        </div>
    </div>

    <div class="app-screen" id="appScreen">
        <div class="video-wrapper" id="videoWrapper">
            <div class="status-badge" id="statusText">Searching...</div>
            <div class="video-box">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">Stranger</div>
            </div>
            <div class="video-box" style="border-bottom: none;">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-label">You</div>
            </div>
        </div>

        <div class="chat-wrapper">
            <div class="messages-area" id="messageBox"></div>
            <div class="input-bar">
                <button class="btn-skip" onclick="skipMatch()">Skip (Esc)</button>
                <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="btn-send" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // 🔒 रेंडर के आंतरिक पाथ को ऑटो-डिटेक्ट करना (यह रेंडर सर्वर क्रैश को रोकेगा)
        const socket = io(window.location.origin, {
            transports: ['websocket', 'polling'],
            upgrade: true
        });

        let localStream;
        let peerConnection;
        let chatMode = 'text';
        const config = { iceServers: [{ urls: "stun:://google.com" }] };

        async function startMatching(mode) {
            chatMode = mode;
            document.getElementById('homeScreen').style.display = 'none';
