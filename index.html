<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrangerPulse - Chat with Strangers</title>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-card: rgba(26, 26, 36, 0.85);
            --accent: #ff4757;
            --accent-blue: #2ed573;
            --text: #ffffff;
            --text-muted: #a4b0be;
            --border: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: var(--bg-main);
            height: 100vh; display: flex; flex-direction: column;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(14, 14, 18, 0.95); border-bottom: 1px solid var(--border);
        }
        header .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        header .stats { font-size: 0.9rem; color: var(--accent-blue); font-weight: 600; }

        .home-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; text-align: center; padding: 20px;
        }
        .home-screen h2 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
        .home-screen p { color: var(--text-muted); max-width: 500px; margin-bottom: 30px; font-size: 1.1rem; }
        
        .filters-container {
            background: var(--bg-card); padding: 25px; border-radius: 16px;
            border: 1px solid var(--border); width: 100%; max-width: 450px; margin-bottom: 25px;
            backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .filter-row { display: flex; justify-content: space-between; margin-bottom: 15px; text-align: left; gap: 15px; }
        .filter-row div { flex: 1; display: flex; flex-direction: column; }
        .filter-row label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; font-weight: bold; }
        .filter-row select { background: #0e0e11; color: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; outline: none; cursor: pointer; }

        .action-buttons { display: flex; gap: 15px; width: 100%; max-width: 500px; }
        .start-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-text { background: #2f3542; color: white; border: 1px solid var(--border); }
        .btn-video { background: var(--accent); color: white; }
        .start-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .app-screen { display: none; flex: 1; height: calc(100vh - 65px); }
        
        .video-wrapper { flex: 1.2; background: #000; position: relative; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .video-box { width: 100%; height: 50%; background: #050507; position: relative; overflow: hidden; border-bottom: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-label { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; font-size: 0.85rem; font-weight: 600; }
        
        .chat-wrapper { flex: 1; background: #0e0e11; display: flex; flex-direction: column; }
        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .messages-area p { margin: 0; padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .msg-system { background: transparent; color: var(--text-muted); align-self: center; font-size: 0.85rem; text-align: center; }
        .msg-you { background: #2f3542; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-stranger { background: #1c1c24; color: white; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        .input-bar { padding: 15px; background: #16161c; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; background: #0e0e11; border: 1px solid var(--border); padding: 14px; border-radius: 25px; color: white; font-size: 1rem; outline: none; }
        .btn-skip { background: #3e444f; color: white; border: none; padding: 14px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 0.95rem; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 14px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 0.95rem; }
        
        .status-badge { position: absolute; top: 15px; left: 15px; background: var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; z-index: 10; }
    </style>
    <!-- 🌐 लाइब्रेरी को सबसे पहले हेड टैग में लोड कर रहे हैं ताकि कोई एरर न आए -->
    <script src="https://socket.io"></script>
</head>
<body>

    <header>
        <div class="logo">StrangerPulse</div>
        <div class="stats">● 3,142 Users Online</div>
    </header>

    <div class="home-screen" id="homeScreen">
        <h2>Talk to Strangers, Instantly.</h2>
        <p>Free random video and text chat with real people worldwide based on your preferences.</p>
        
        <div class="filters-container">
            <div class="filter-row">
                <div>
                    <label>My Gender</label>
                    <select id="myGender">
                        <option value="boy">Boy 🕺</option>
                        <option value="girl">Girl 💃</option>
                    </select>
                </div>
                <div>
                    <label>Match With</label>
                    <select id="lookFor">
                        <option value="anyone">Anyone 🌍</option>
                        <option value="girl">Girls Only 💃</option>
                        <option value="boy">Boys Only 🕺</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div>
                    <label>Location</label>
                    <select id="countryFilter">
                        <option value="any">Worldwide 🌐</option>
                        <option value="IN">India 🇮🇳</option>
                        <option value="US">United States 🇺🇸</option>
                    </select>
                </div>
                <div>
                    <label>Language</label>
                    <select id="langFilter">
                        <option value="any">Any Language 🗣️</option>
                        <option value="hindi">Hindi 🇮🇳</option>
                        <option value="english">English 🇬🇧</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="start-btn btn-text" onclick="startMatching('text')">Text Chat 💬</button>
            <button class="start-btn btn-video" onclick="startMatching('video')">Video Chat 🎥</button>
        </div>
    </div>

    <div class="app-screen" id="appScreen">
        <div class="video-wrapper" id="videoWrapper">
            <div class="status-badge" id="statusText">Searching...</div>
            <div class="video-box">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">Stranger</div>
            </div>
            <div class="video-box" style="border-bottom: none;">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-label">You</div>
            </div>
        </div>

        <div class="chat-wrapper">
            <div class="messages-area" id="messageBox"></div>
            <div class="input-bar">
                <button class="btn-skip" onclick="skipMatch()">Skip (Esc)</button>
                <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="btn-send" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // सर्वर कनेक्शन को पूरी सुरक्षा के साथ इनिशियलाइज़ करना
        const socket = io();

        let localStream;
        let peerConnection;
        let chatMode = 'text';
        const config = { iceServers: [{ urls: "stun:://google.com" }] };

        async function startMatching(mode) {
            chatMode = mode;
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'flex';
            document.getElementById('messageBox').innerHTML = `<p class="msg-system">Searching for a perfect stranger...</p>`;
            
            if (chatMode === 'video') {
                document.getElementById('videoWrapper').style.display = 'flex';
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    document.getElementById('localVideo').srcObject = localStream;
                } catch (err) {
                    alert("Camera access denied! Switching to Text Mode.");
