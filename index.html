<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldwide Video Chat</title>
    <style>
        /* पूरी स्क्रीन का डिजाइन (Dark Theme) */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            height: 100vh;
        }

        /* लेफ्ट साइड: वीडियो एरिया */
        .video-container {
            flex: 3;
            position: relative;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* सामने वाले का बड़ा वीडियो */
        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* आपका खुद का छोटा वीडियो (Corner में) */
        #localVideo {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 10px;
            border: 2px solid #3498db;
            object-fit: cover;
            background-color: #222;
        }

        /* नीचे के कंट्रोल बटन्स (Call, Mute, End) */
        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start { background-color: #2ecc71; color: white; }
        .btn-end { background-color: #e74c3c; color: white; }

        /* राइट साइड: चैट बॉक्स एरिया */
        .chat-container {
            flex: 1;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #34495e;
        }

        .chat-header {
            padding: 15px;
            background-color: #34495e;
            text-align: center;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background-color: #222;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        .chat-input-area button {
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- वीडियो कॉलिंग का हिस्सा -->
    <div class="video-container">
        <!-- मुख्य स्क्रीन (सामने वाले का वीडियो दिखेगा) -->
        <video id="remoteVideo" autoplay playsinline poster="https://placeholder.com..."></video>
        
        <!-- छोटी स्क्रीन (आपका खुद का वीडियो दिखेगा) -->
        <video id="localVideo" autoplay playsinline muted></video>

        <!-- बटन्स -->
        <div class="controls">
            <button class="btn btn-start" onclick="startCamera()">Start Camera</button>
            <button class="btn btn-end">End Call</button>
        </div>
    </div>

    <!-- चैटिंग का हिस्सा -->
    <div class="chat-container">
        <div class="chat-header">Global Chat Room</div>
        <div class="messages" id="messageBox">
            <p><b>System:</b> Welcome to Worldwide Chat! Click "Start Camera" to test your webcam.</p>
        </div>
        <div class="chat-input-area">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- कैमरा चालू करने और चैट चलाने का जावास्क्रिप्ट कोड -->
       <!-- Socket.io लाइब्रेरी को जोड़ना -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // सर्वर से कनेक्ट करना
        const socket = io();

        // 1. आपका कैमरा और माइक चालू करने का फंक्शन
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = stream;
            } catch (error) {
                alert("Camera access denied or not found!");
            }
        }

        // 2. चैट बॉक्स में मैसेज भेजना (सर्वर को भेजना)
        function sendMessage() {
            let input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                let msg = input.value;
                
                // खुद की स्क्रीन पर दिखाना
                showNewMessage(`<b>You:</b> ${msg}`);
                
                // सर्वर को भेजना ताकि दूसरों को मिले
                socket.emit('chat-message', msg);
                input.value = "";
            }
        }

        // 3. जब कोई दूसरा व्यक्ति मैसेज भेजेगा (सर्वर से मैसेज मिलना)
        socket.on('chat-message', (msg) => {
            showNewMessage(`<b>Stranger:</b> ${msg}`);
        });

        // स्क्रीन पर मैसेज प्रिंट करने का कॉमन फंक्शन
        function showNewMessage(text) {
            let box = document.getElementById('messageBox');
            box.innerHTML += `<p>${text}</p>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>


</body>
</html>
